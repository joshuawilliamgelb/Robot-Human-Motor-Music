<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Robot / Human</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  background: #000;
  width: 100%; height: 100%;
  overflow: hidden;
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  touch-action: none;
}
#stage {
  width: 100vw; height: 100vh;
  display: flex; align-items: center; justify-content: center;
  background: #000;
}
#wrap {
  display: inline-grid;
  grid-template-columns: auto var(--gap) var(--vw);
  grid-template-rows: var(--vh) var(--gap) auto;
}

/* desktop */
:root {
  --vh: 75vh;
  --vw: calc(75vh * 9 / 16);
  --gap: 3vh;
}
/* mobile */
@media (max-width: 600px) {
  :root {
    --vh: calc(72vw * 16 / 9);
    --vw: 72vw;
    --gap: 4vw;
  }
}

#y-track-cell {
  grid-column: 1; grid-row: 1;
  display: flex; flex-direction: row;
  align-items: stretch; justify-content: flex-end;
  gap: 6px;
}
#y-labels {
  display: flex; flex-direction: column;
  justify-content: space-between; align-items: flex-end;
}
.y-end { display: flex; flex-direction: column; align-items: flex-end; gap: 2px; }
#y-track { width: 12px; display: flex; align-items: center; justify-content: center; }
#y-slider {
  -webkit-appearance: none; appearance: none;
  writing-mode: vertical-lr; direction: rtl;
  width: 1px; height: var(--vh);
  background: #2a2a2a; outline: none;
  cursor: ns-resize; padding: 0; margin: 0; flex-shrink: 0;
}
#y-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 12px; height: 12px; border-radius: 50%;
  background: #fff; border: none;
}
#y-slider::-moz-range-thumb {
  width: 12px; height: 12px; border-radius: 50%; background: #fff; border: none;
}

#video-cell {
  grid-column: 3; grid-row: 1;
  position: relative; background: #000; overflow: hidden; cursor: pointer;
}

/* canvas fills the cell */
#blend-canvas {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
}

/* poster shown before play */
#poster {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  object-fit: cover;
  z-index: 2;
  transition: opacity 0.4s;
}
#poster.hidden { opacity: 0; pointer-events: none; }

#play-overlay {
  position: absolute; inset: 0; z-index: 10;
  display: flex; align-items: flex-start; justify-content: center;
  padding-top: 66.666%;
  cursor: pointer; background: rgba(0,0,0,0.45);
  transition: opacity 0.4s; opacity: 1; pointer-events: auto;
}
#play-overlay.hidden { opacity: 0; pointer-events: none; }
#tap-label {
  font-size: 9px; letter-spacing: 0.18em;
  text-transform: uppercase; color: rgba(255,255,255,0.5);
}

#x-track-cell {
  grid-column: 3; grid-row: 3;
  display: flex; flex-direction: column;
  align-items: stretch; padding-top: 8px;
}
#x-slider {
  width: 100%; -webkit-appearance: none; appearance: none;
  height: 1px; background: #2a2a2a; outline: none;
  cursor: ew-resize; display: block; margin: 0 0 5px 0; padding: 0;
}
#x-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 12px; height: 12px; border-radius: 50%;
  background: #fff; border: none;
}
#x-slider::-moz-range-thumb {
  width: 12px; height: 12px; border-radius: 50%; background: #fff; border: none;
}
#x-labels { display: flex; justify-content: space-between; }
.x-end { display: flex; flex-direction: column; align-items: flex-start; gap: 2px; }
.x-end.right { align-items: flex-end; }
.lbl {
  font-size: 9px; letter-spacing: 0.13em; text-transform: uppercase;
  color: #333; transition: color 0.12s; white-space: nowrap; line-height: 1.4;
}
.lbl.on { color: #999; }
.pct {
  font-size: 9px; color: #555; opacity: 0;
  white-space: nowrap; line-height: 1.4;
  font-variant-numeric: tabular-nums; transition: opacity 0.1s;
}
.pct.on { opacity: 1; }
</style>
</head>
<body>
<div id="stage">
  <div id="wrap">
    <div id="y-track-cell">
      <div id="y-labels">
        <div class="y-end">
          <span class="lbl" id="lbl-music">music</span>
          <span class="pct" id="pct-music"></span>
        </div>
        <div class="y-end">
          <span class="pct" id="pct-motor"></span>
          <span class="lbl" id="lbl-motor">motor</span>
        </div>
      </div>
      <div id="y-track">
        <input type="range" id="y-slider" min="0" max="100" value="0" step="1" />
      </div>
    </div>

    <div id="video-cell">
      <canvas id="blend-canvas"></canvas>
      <img id="poster" src="https://tiqrobothuman.b-cdn.net/poster.jpg" alt="" />
      <div id="play-overlay">
        <span id="tap-label">tap to play</span>
      </div>
    </div>

    <div id="x-track-cell">
      <input type="range" id="x-slider" min="0" max="100" value="0" step="1" />
      <div id="x-labels">
        <div class="x-end left">
          <span class="lbl" id="lbl-robot">robot</span>
          <span class="pct" id="pct-robot"></span>
        </div>
        <div class="x-end right">
          <span class="lbl" id="lbl-human">human</span>
          <span class="pct" id="pct-human"></span>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- hidden videos, no autoplay, no loop — we manage looping manually -->
<video id="vid-evo"
  src="https://tiqrobothuman.b-cdn.net/evo.mp4"
  muted playsinline preload="auto"
  style="display:none"></video>
<video id="vid-joshua"
  src="https://tiqrobothuman.b-cdn.net/joshua.mp4"
  muted playsinline preload="auto"
  style="display:none"></video>

<script>
const xEl = document.getElementById('x-slider');
const yEl = document.getElementById('y-slider');
const vidEvo = document.getElementById('vid-evo');
const vidJoshua = document.getElementById('vid-joshua');
const videoCell = document.getElementById('video-cell');
const overlay = document.getElementById('play-overlay');
const poster = document.getElementById('poster');
const canvas = document.getElementById('blend-canvas');
const ctx = canvas.getContext('2d');

const lblRobot = document.getElementById('lbl-robot');
const lblHuman = document.getElementById('lbl-human');
const lblMusic = document.getElementById('lbl-music');
const lblMotor = document.getElementById('lbl-motor');
const pctRobot = document.getElementById('pct-robot');
const pctHuman = document.getElementById('pct-human');
const pctMusic = document.getElementById('pct-music');
const pctMotor = document.getElementById('pct-motor');

const DURATION = 114.5;
const LOOP_THRESHOLD = 0.4;

let started = false;
let playing = false;
let looping = false;
let rafId = null;
let blendX = 0; // 0=evo, 1=human

// Audio
let audioCtx = null;
let motorGain = null, musicGain = null;
let motorSrc = null, musicSrc = null;
let motorBuf = null, musicBuf = null;
let audioReady = false;
let audioPlayOffset = 0;
let audioStartedAt = 0;
let targetMotorGain = 1;
let targetMusicGain = 0;

// size canvas to match cell
function resizeCanvas() {
  canvas.width = videoCell.offsetWidth;
  canvas.height = videoCell.offsetHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// draw loop — composite evo + joshua onto canvas
function drawFrame() {
  if (!playing) return;

  const w = canvas.width;
  const h = canvas.height;

  // draw evo (base)
  ctx.globalAlpha = 1;
  ctx.drawImage(vidEvo, 0, 0, w, h);

  // draw joshua on top with blendX opacity
  if (blendX > 0) {
    ctx.globalAlpha = blendX;
    ctx.drawImage(vidJoshua, 0, 0, w, h);
  }

  // check loop point
  const t = vidEvo.currentTime;
  if (!looping && t >= DURATION - LOOP_THRESHOLD) {
    doLoop();
  }

  rafId = requestAnimationFrame(drawFrame);
}

function doLoop() {
  looping = true;
  vidEvo.currentTime = 0;
  vidJoshua.currentTime = 0;
  // restart audio sources from 0
  if (audioReady) {
    restartAudio(0);
  }
  setTimeout(() => { looping = false; }, 500);
}

// --- AUDIO ---
function createAndStartSources(offset) {
  if (motorSrc) { try { motorSrc.stop(); } catch(e){} }
  if (musicSrc) { try { musicSrc.stop(); } catch(e){} }

  motorSrc = audioCtx.createBufferSource();
  motorSrc.buffer = motorBuf;
  motorSrc.connect(motorGain);

  musicSrc = audioCtx.createBufferSource();
  musicSrc.buffer = musicBuf;
  musicSrc.connect(musicGain);

  const when = audioCtx.currentTime;
  motorSrc.start(when, offset);
  musicSrc.start(when, offset);
  audioStartedAt = when;
  audioPlayOffset = offset;
}

function restartAudio(offset) {
  if (!audioReady) return;
  createAndStartSources(offset);
}

function pauseAudio() {
  if (!audioReady) return;
  audioPlayOffset = audioCtx.currentTime - audioStartedAt + audioPlayOffset;
  audioCtx.suspend();
}

function resumeAudio() {
  if (!audioReady) return;
  audioCtx.resume().then(() => {
    // resync audio to video
    const videoT = vidEvo.currentTime;
    createAndStartSources(videoT);
  });
}

async function loadAudio() {
  async function fetchBuf(url) {
    const r = await fetch(url);
    const ab = await r.arrayBuffer();
    return audioCtx.decodeAudioData(ab);
  }
  try {
    [motorBuf, musicBuf] = await Promise.all([
      fetchBuf('https://tiqrobothuman.b-cdn.net/motor.m4a'),
      fetchBuf('https://tiqrobothuman.b-cdn.net/music.m4a')
    ]);
    motorGain = audioCtx.createGain();
    musicGain = audioCtx.createGain();
    motorGain.gain.value = targetMotorGain;
    musicGain.gain.value = targetMusicGain;
    motorGain.connect(audioCtx.destination);
    musicGain.connect(audioCtx.destination);
    audioReady = true;
    // start audio synced to where video is now
    createAndStartSources(vidEvo.currentTime);
  } catch(e) {
    console.warn('audio load failed', e);
  }
}

// --- TAP HANDLER ---
function handleTap() {
  if (!started) {
    started = true;
    playing = true;

    // hide overlay and poster immediately
    overlay.classList.add('hidden');
    poster.classList.add('hidden');

    // start videos
    vidEvo.play();
    vidJoshua.play();

    // create AudioContext synchronously inside gesture
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    // load audio in background — no await, no blocking
    loadAudio();

    rafId = requestAnimationFrame(drawFrame);

  } else if (playing) {
    // pause
    playing = false;
    if (rafId) cancelAnimationFrame(rafId);
    vidEvo.pause();
    vidJoshua.pause();
    pauseAudio();
    overlay.classList.remove('hidden');

  } else {
    // resume
    playing = true;
    overlay.classList.add('hidden');
    vidEvo.play();
    vidJoshua.play();
    resumeAudio();
    rafId = requestAnimationFrame(drawFrame);
  }
}

videoCell.addEventListener('click', handleTap);
videoCell.addEventListener('touchend', (e) => {
  e.preventDefault();
  handleTap();
});

// pause on tab hidden
document.addEventListener('visibilitychange', () => {
  if (!started || !playing) return;
  if (document.hidden) {
    playing = false;
    if (rafId) cancelAnimationFrame(rafId);
    vidEvo.pause();
    vidJoshua.pause();
    pauseAudio();
    overlay.classList.remove('hidden');
  }
});

// --- SLIDERS ---
function setX(v, drag) {
  const t = v / 100;
  blendX = t;
  lblRobot.className = 'lbl' + (t < 0.5 ? ' on' : '');
  lblHuman.className = 'lbl' + (t >= 0.5 ? ' on' : '');
  pctRobot.textContent = Math.round((1 - t) * 100) + '%';
  pctHuman.textContent = Math.round(t * 100) + '%';
  pctRobot.className = 'pct' + (drag ? ' on' : '');
  pctHuman.className = 'pct' + (drag ? ' on' : '');
}

function setY(v, drag) {
  const t = v / 100;
  targetMotorGain = 1 - t;
  targetMusicGain = t;
  if (motorGain) motorGain.gain.setTargetAtTime(1 - t, audioCtx.currentTime, 0.05);
  if (musicGain) musicGain.gain.setTargetAtTime(t, audioCtx.currentTime, 0.05);
  lblMusic.className = 'lbl' + (t >= 0.5 ? ' on' : '');
  lblMotor.className = 'lbl' + (t < 0.5 ? ' on' : '');
  pctMusic.textContent = Math.round(t * 100) + '%';
  pctMotor.textContent = Math.round((1 - t) * 100) + '%';
  pctMusic.className = 'pct' + (drag ? ' on' : '');
  pctMotor.className = 'pct' + (drag ? ' on' : '');
}

xEl.addEventListener('input', () => setX(+xEl.value, true));
xEl.addEventListener('mouseup', () => setX(+xEl.value, false));
xEl.addEventListener('touchend', (e) => { e.stopPropagation(); setX(+xEl.value, false); });
yEl.addEventListener('input', () => setY(+yEl.value, true));
yEl.addEventListener('mouseup', () => setY(+yEl.value, false));
yEl.addEventListener('touchend', (e) => { e.stopPropagation(); setY(+yEl.value, false); });

setX(0, false);
setY(0, false);
</script>
</body>
</html>
