<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Robot / Human</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  background: #000;
  width: 100%; height: 100%;
  overflow: hidden;
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
}
#stage {
  width: 100vw;
  height: 100vh;
  height: calc(var(--win-h, 100vh));
  display: flex; align-items: center; justify-content: center;
  background: #000;
}

:root {
  --vh: 75vh;
  --vw: calc(75vh * 9 / 16);
  --gap: 3vh;
  --thumb: 12px;
  --label-pad-y: 8px;
  --label-pad-x: 4px;
}
@media (max-width: 600px) {
  :root {
    --vh: calc(64vw * 16 / 9);
    --vw: 64vw;
    --gap: 4vw;
    --thumb: 20px;
    --label-pad-y: 14px;
    --label-pad-x: 12px;
  }
}

#wrap {
  display: inline-grid;
  grid-template-columns: auto var(--gap) var(--vw);
  grid-template-rows: var(--vh) var(--gap) auto;
}

#y-track-cell {
  grid-column: 1; grid-row: 1;
  display: flex; flex-direction: row;
  align-items: stretch; justify-content: flex-end;
  gap: 6px;
}
#y-labels {
  display: flex; flex-direction: column;
  justify-content: space-between; align-items: flex-end;
  padding: var(--label-pad-y) 0;
}
.y-end { display: flex; flex-direction: column; align-items: flex-end; gap: 2px; }
#y-track { width: calc(var(--thumb) + 2px); display: flex; align-items: center; justify-content: center; }
#y-slider {
  -webkit-appearance: none; appearance: none;
  writing-mode: vertical-lr; direction: rtl;
  width: 1px; height: var(--vh);
  background: #2a2a2a; outline: none;
  cursor: ns-resize; padding: 0; margin: 0; flex-shrink: 0;
  touch-action: none;
}
#y-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: var(--thumb); height: var(--thumb); border-radius: 50%;
  background: #fff; border: none;
}
#y-slider::-moz-range-thumb {
  width: var(--thumb); height: var(--thumb); border-radius: 50%;
  background: #fff; border: none;
}

#video-cell {
  grid-column: 3; grid-row: 1;
  position: relative; background: #000; overflow: hidden; cursor: pointer;
}
#blend-canvas {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
}
#poster {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  object-fit: cover; z-index: 2;
  transition: opacity 0.4s;
}
#poster.hidden { opacity: 0; pointer-events: none; }
#play-overlay {
  position: absolute; inset: 0; z-index: 10;
  display: flex; align-items: flex-start; justify-content: center;
  padding-top: 66.666%;
  cursor: pointer; background: rgba(0,0,0,0.45);
  transition: opacity 0.4s; opacity: 1; pointer-events: auto;
}
#play-overlay.hidden { opacity: 0; pointer-events: none; }
#tap-label {
  font-size: 9px; letter-spacing: 0.18em;
  text-transform: uppercase; color: rgba(255,255,255,0.5);
}

#x-track-cell {
  grid-column: 3; grid-row: 3;
  display: flex; flex-direction: column;
  align-items: stretch; padding-top: 8px;
}
#x-slider {
  width: 100%; -webkit-appearance: none; appearance: none;
  height: 1px; background: #2a2a2a; outline: none;
  cursor: ew-resize; display: block; margin: 0 0 0 0; padding: 0;
  touch-action: none;
}
#x-labels {
  margin-top: calc(var(--label-pad-x) + 2px);
}
#x-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: var(--thumb); height: var(--thumb); border-radius: 50%;
  background: #fff; border: none;
}
#x-slider::-moz-range-thumb {
  width: var(--thumb); height: var(--thumb); border-radius: 50%;
  background: #fff; border: none;
}
#x-labels { display: flex; justify-content: space-between; }
.x-end { display: flex; flex-direction: column; align-items: flex-start; gap: 2px; }
.x-end.right { align-items: flex-end; }
.lbl {
  font-size: 9px; letter-spacing: 0.13em; text-transform: uppercase;
  color: #333; transition: color 0.12s; white-space: nowrap; line-height: 1.4;
}
.lbl.on { color: #999; }
.pct {
  font-size: 9px; color: #555; opacity: 0;
  white-space: nowrap; line-height: 1.4;
  font-variant-numeric: tabular-nums; transition: opacity 0.1s;
}
.pct.on { opacity: 1; }
</style>
</head>
<body>
<div id="stage">
  <div id="wrap">
    <div id="y-track-cell">
      <div id="y-labels">
        <div class="y-end">
          <span class="lbl" id="lbl-music">music</span>
          <span class="pct" id="pct-music"></span>
        </div>
        <div class="y-end">
          <span class="pct" id="pct-motor"></span>
          <span class="lbl" id="lbl-motor">motor</span>
        </div>
      </div>
      <div id="y-track">
        <input type="range" id="y-slider" min="0" max="100" value="0" step="1" />
      </div>
    </div>

    <div id="video-cell">
      <canvas id="blend-canvas"></canvas>
      <img id="poster" src="https://tiqrobothuman.b-cdn.net/poster.jpg" alt="" />
      <div id="play-overlay">
        <span id="tap-label">tap to play</span>
      </div>
    </div>

    <div id="x-track-cell">
      <input type="range" id="x-slider" min="0" max="100" value="0" step="1" />
      <div id="x-labels">
        <div class="x-end left">
          <span class="lbl" id="lbl-robot">robot</span>
          <span class="pct" id="pct-robot"></span>
        </div>
        <div class="x-end right">
          <span class="lbl" id="lbl-human">human</span>
          <span class="pct" id="pct-human"></span>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="dbg" style="position:fixed;bottom:10px;left:10px;color:#fff;font-size:11px;z-index:999;background:rgba(0,0,0,0.7);padding:4px 8px;pointer-events:none;">waiting...</div>

<video id="vid-evo" src="https://tiqrobothuman.b-cdn.net/evo.mp4"
  muted playsinline preload="auto" style="display:none"></video>
<video id="vid-joshua" src="https://tiqrobothuman.b-cdn.net/joshua.mp4"
  muted playsinline preload="auto" style="display:none"></video>

<script>
// fix Chrome mobile vh
function setWinH() {
  document.documentElement.style.setProperty('--win-h', window.innerHeight + 'px');
}
setWinH();
window.addEventListener('resize', setWinH);

const xEl = document.getElementById('x-slider');
const yEl = document.getElementById('y-slider');
const vidEvo = document.getElementById('vid-evo');
const vidJoshua = document.getElementById('vid-joshua');
const videoCell = document.getElementById('video-cell');
const overlay = document.getElementById('play-overlay');
const poster = document.getElementById('poster');
const canvas = document.getElementById('blend-canvas');
const ctx2d = canvas.getContext('2d');

const lblRobot = document.getElementById('lbl-robot');
const lblHuman = document.getElementById('lbl-human');
const lblMusic = document.getElementById('lbl-music');
const lblMotor = document.getElementById('lbl-motor');
const pctRobot = document.getElementById('pct-robot');
const pctHuman = document.getElementById('pct-human');
const pctMusic = document.getElementById('pct-music');
const pctMotor = document.getElementById('pct-motor');

const DURATION = 114.5;
const LOOP_THRESHOLD = 0.4;

let started = false;
let playing = false;
let looping = false;
let rafId = null;
let blendX = 0;

// Web Audio for reliable mobile volume control
let audioCtx = null, motorNode, musicNode, motorGain, musicGain;
let motorReady = false, musicReady = false;
let targetMotor = 1, targetMusic = 0;

function resizeCanvas() {
  const dpr = window.devicePixelRatio || 1;
  const w = videoCell.offsetWidth;
  const h = videoCell.offsetHeight;
  canvas.width = w * dpr;
  canvas.height = h * dpr;
  canvas._cssW = w;
  canvas._cssH = h;
  ctx2d.setTransform(dpr, 0, 0, dpr, 0, 0);
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

function drawFrame() {
  if (!playing) return;
  const w = canvas._cssW;
  const h = canvas._cssH;
  ctx2d.globalAlpha = 1;
  ctx2d.drawImage(vidEvo, 0, 0, w, h);
  if (blendX > 0) {
    ctx2d.globalAlpha = blendX;
    ctx2d.drawImage(vidJoshua, 0, 0, w, h);
  }
  const t = vidEvo.currentTime;
  if (!looping && t >= DURATION - LOOP_THRESHOLD) {
    looping = true;
    vidEvo.currentTime = 0;
    vidJoshua.currentTime = 0;
    if (motorNode) { motorNode.currentTime = 0; }
    if (musicNode) { musicNode.currentTime = 0; }
    setTimeout(() => { looping = false; }, 600);
  }
  rafId = requestAnimationFrame(drawFrame);
}

function setupAudio() {
  // create context synchronously in gesture — critical for mobile
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  motorGain = audioCtx.createGain();
  musicGain = audioCtx.createGain();
  motorGain.gain.value = 1;
  musicGain.gain.value = 0;
  motorGain.connect(audioCtx.destination);
  musicGain.connect(audioCtx.destination);

  // load via fetch into BufferSource — reliable on all platforms
  async function load(url, gainNode) {
    const res = await fetch(url, { credentials: 'omit' });
    const buf = await res.arrayBuffer();
    const decoded = await audioCtx.decodeAudioData(buf);
    const src = audioCtx.createBufferSource();
    src.buffer = decoded;
    src.loop = true;
    src.connect(gainNode);
    src.start(0);
    return src;
  }

  const dbg = document.getElementById('dbg');

  load('https://tiqrobothuman.b-cdn.net/motor.m4a', motorGain)
    .then(src => { motorNode = src; dbg.textContent = 'motor ok'; })
    .catch(e => { dbg.textContent = 'motor fail: ' + e.message; console.warn('motor load failed', e); });

  load('https://tiqrobothuman.b-cdn.net/music.m4a', musicGain)
    .then(src => { musicNode = src; dbg.textContent += ' music ok ctx:' + audioCtx.state; })
    .catch(e => { dbg.textContent += ' music fail: ' + e.message; console.warn('music load failed', e); });
}

function handleTap() {
  if (!started) {
    started = true;
    playing = true;
    overlay.classList.add('hidden');
    poster.classList.add('hidden');
    vidEvo.play().catch(e => {});
    vidJoshua.play().catch(e => {});
    setupAudio();
    rafId = requestAnimationFrame(drawFrame);

  } else if (playing) {
    playing = false;
    if (rafId) cancelAnimationFrame(rafId);
    vidEvo.pause();
    vidJoshua.pause();
    if (audioCtx) audioCtx.suspend();
    overlay.classList.remove('hidden');

  } else {
    playing = true;
    vidEvo.play().catch(e => {});
    vidJoshua.play().catch(e => {});
    if (audioCtx) audioCtx.resume();
    overlay.classList.add('hidden');
    rafId = requestAnimationFrame(drawFrame);
  }
}

videoCell.addEventListener('click', handleTap);

document.addEventListener('visibilitychange', () => {
  if (!started || !playing) return;
  if (document.hidden) {
    playing = false;
    if (rafId) cancelAnimationFrame(rafId);
    vidEvo.pause();
    vidJoshua.pause();
    if (audioCtx) audioCtx.suspend();
    overlay.classList.remove('hidden');
  }
});

function setupSliderTouch(slider, isVertical) {
  let startVal, startPos;
  slider.addEventListener('touchstart', (e) => {
    e.stopPropagation();
    startVal = +slider.value;
    startPos = isVertical ? e.touches[0].clientY : e.touches[0].clientX;
  }, { passive: true });
  slider.addEventListener('touchmove', (e) => {
    e.stopPropagation();
    const pos = isVertical ? e.touches[0].clientY : e.touches[0].clientX;
    const rect = slider.getBoundingClientRect();
    const size = isVertical ? rect.height : rect.width;
    const delta = (pos - startPos) / size * 100;
    const newVal = isVertical
      ? Math.max(0, Math.min(100, startVal - delta))
      : Math.max(0, Math.min(100, startVal + delta));
    slider.value = newVal;
    if (isVertical) setY(newVal, true);
    else setX(newVal, true);
  }, { passive: true });
  slider.addEventListener('touchend', (e) => {
    e.stopPropagation();
    if (isVertical) setY(+slider.value, false);
    else setX(+slider.value, false);
  }, { passive: true });
}
setupSliderTouch(xEl, false);
setupSliderTouch(yEl, true);

function setX(v, drag) {
  const t = v / 100;
  blendX = t;
  lblRobot.className = 'lbl' + (t < 0.5 ? ' on' : '');
  lblHuman.className = 'lbl' + (t >= 0.5 ? ' on' : '');
  pctRobot.textContent = Math.round((1 - t) * 100) + '%';
  pctHuman.textContent = Math.round(t * 100) + '%';
  pctRobot.className = 'pct' + (drag ? ' on' : '');
  pctHuman.className = 'pct' + (drag ? ' on' : '');
}

function setY(v, drag) {
  const t = v / 100;
  if (audioCtx && motorGain && musicGain) {
    motorGain.gain.setTargetAtTime(1 - t, audioCtx.currentTime, 0.05);
    musicGain.gain.setTargetAtTime(t, audioCtx.currentTime, 0.05);
  } else {
    if (motorNode) motorNode.volume = Math.max(0, Math.min(1, 1 - t));
    if (musicNode) musicNode.volume = Math.max(0, Math.min(1, t));
  }
  lblMusic.className = 'lbl' + (t >= 0.5 ? ' on' : '');
  lblMotor.className = 'lbl' + (t < 0.5 ? ' on' : '');
  pctMusic.textContent = Math.round(t * 100) + '%';
  pctMotor.textContent = Math.round((1 - t) * 100) + '%';
  pctMusic.className = 'pct' + (drag ? ' on' : '');
  pctMotor.className = 'pct' + (drag ? ' on' : '');
}

xEl.addEventListener('input', () => setX(+xEl.value, true));
xEl.addEventListener('mouseup', () => setX(+xEl.value, false));
yEl.addEventListener('input', () => setY(+yEl.value, true));
yEl.addEventListener('mouseup', () => setY(+yEl.value, false));

setX(0, false);
setY(0, false);
</script>
</body>
</html>
